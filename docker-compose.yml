
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-haulsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haulsync}
      POSTGRES_DB:       ${POSTGRES_DB:-haulsync_ct}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haulsync} -d ${POSTGRES_DB:-haulsync_ct}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:               postgresql://${POSTGRES_USER:-haulsync}:${POSTGRES_PASSWORD:-haulsync}@postgres:5432/${POSTGRES_DB:-haulsync_ct}
      JWT_SECRET:                 ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL:               http://localhost:3002
      PORT:                       5002
      NODE_ENV:                   ${NODE_ENV:-production}
      HALT_THRESHOLD_MINUTES:     ${HALT_THRESHOLD_MINUTES:-30}
      DELAY_THRESHOLD_MINUTES:    ${DELAY_THRESHOLD_MINUTES:-60}
      SLA_BREACH_WARNING_MINUTES: ${SLA_BREACH_WARNING_MINUTES:-120}
      SMTP_HOST:                  ${SMTP_HOST:-}
      SMTP_PORT:                  ${SMTP_PORT:-587}
      SMTP_USER:                  ${SMTP_USER:-}
      SMTP_PASS:                  ${SMTP_PASS:-}
      WEBHOOK_URL:                ${WEBHOOK_URL:-}
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3002:80"

volumes:
  postgres_data:

